version: '3.8'

services:
  gz-server:
    build: ./gz-server
    container_name: gazebo-server
    environment:
      - GZ_PARTITION=gazebo
      - QT_QPA_PLATFORM=offscreen
      - GZ_SIM_RENDER_ENGINE=ogre2
      - GZ_GUI_CONFIG_PATH=/dev/null
      - GZ_SIM_RESOURCE_PATH=/workspace/models:/workspace/worlds/harmonic_world
    volumes:
      - ./worlds:/workspace/worlds:ro
    ports:
      - "11345:11345"  
      - "8765:8765"     
    command: /workspace/worlds/harmonic_world/
    networks:
      - gazebo-net

  gz-client:
    build: ./gz-client
    container_name: gazebo-client
    environment:
      - DISPLAY=${DISPLAY:-:1}
      - GZ_PARTITION=gazebo
      - QT_X11_NO_MITSHM=1
      - XDG_RUNTIME_DIR=/tmp/runtime-root
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./worlds:/workspace/worlds:ro
    networks:
      - gazebo-net   
    depends_on:
      - gz-server
    command: bash -c "sleep 3 && gz sim -g"

networks:
  gazebo-net:
    driver: bridge